# SideMolly is single-package, not a real workspace, but pnpm requires
# this file to exist with `packages: []`.
#
# `allowBuilds` is pnpm 11's gate for which dependency lifecycle scripts
# are allowed to run. Without these approvals pnpm 11 hard-fails with
# `ERR_PNPM_IGNORED_BUILDS` instead of a warning:
#   • esbuild — needs to drop platform-native binaries.
#   • core-js — postinstall is a benign marketing banner.
#
# Same rationale as Molly/pnpm-workspace.yaml.
packages: []

allowBuilds:
  core-js: true
  esbuild: true
