name: PurpleTracker
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  GRDB:
    path: Vendor/GRDB

targets:
  PurpleTracker:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleTracker
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/PurpleTracker/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleTracker/App/PurpleTracker.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: GRDB
    scheme:
      testTargets:
        - PurpleTrackerTests

  PurpleTrackerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleTrackerTests
    dependencies:
      - target: PurpleTracker
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleTrackerTests
