name: MasterClipper
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16"

packages:
  MasterClipperCore:
    path: Packages/MasterClipperCore

targets:
  MasterClipper:
    type: application
    platform: macOS
    sources:
      - path: Sources/MasterClipper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.MasterClipper
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SRKV8T38CD
        INFOPLIST_FILE: Sources/MasterClipper/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/MasterClipper/App/MasterClipper.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
    dependencies:
      - package: MasterClipperCore
    scheme:
      testTargets: []

  MasterClipperiOS:
    type: application
    platform: iOS
    sources:
      - path: iOS/Sources/MasterClipperiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.MasterClipper.ios
        PRODUCT_NAME: MasterClipper
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SRKV8T38CD
        INFOPLIST_FILE: iOS/Sources/MasterClipperiOS/App/Info.plist
        SUPPORTS_MACCATALYST: "NO"
    entitlements:
      path: iOS/Sources/MasterClipperiOS/App/MasterClipperiOS.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
    dependencies:
      - package: MasterClipperCore
    scheme:
      testTargets: []
