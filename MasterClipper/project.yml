name: MasterClipper
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  MasterClipperCore:
    path: Packages/MasterClipperCore

targets:
  MasterClipper:
    type: application
    platform: macOS
    sources:
      - path: Sources/MasterClipper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.MasterClipper
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/MasterClipper/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/MasterClipper/App/MasterClipper.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.bronty13.MasterClipper
    dependencies:
      - package: MasterClipperCore
    scheme:
      testTargets: []
