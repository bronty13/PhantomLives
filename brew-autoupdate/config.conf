# ============================================================================
#
#  HOMEBREW AUTO-UPDATE CONFIGURATION
#
#  File:     config.conf
#  Location: ~/.config/brew-autoupdate/config.conf (after install)
#
#  This file controls all behavior of the Homebrew Auto-Update daemon.
#  Edit values below and they take effect on the NEXT scheduled or manual run.
#  No restart of the daemon is needed - the script reads this file each time.
#
#  Format:
#    KEY=value
#    - Boolean values: true / false (lowercase)
#    - Numeric values: integers only
#    - String values: no quotes needed
#    - Comments start with # (inline comments after values are supported)
#    - Blank lines are ignored
#
# ============================================================================


# ============================================================================
# LOG RETENTION
# ============================================================================
# The auto-update system maintains two tiers of logs:
#
# DETAIL LOGS: Maximum verbosity - full brew command output, config dumps,
#   brew doctor diagnostics, etc. One file per run. Use these to troubleshoot
#   errors or understand exactly what happened during an update cycle.
#   Location: ~/Library/Logs/brew-autoupdate/detail/
#
# SUMMARY LOGS: High-level events only - what was outdated, what was
#   upgraded, errors encountered. One file per day (appended). Use these
#   for a long-term record of your system's update history.
#   Location: ~/Library/Logs/brew-autoupdate/summary/
#
# Logs older than the retention period are automatically deleted at the
# end of each update cycle. Adjust these values to balance between
# troubleshooting capability and disk usage.
# ----------------------------------------------------------------------------

# Detail logs (verbose troubleshooting) - days to keep
# At 4 runs/day, 90 days = ~360 log files
DETAIL_LOG_RETENTION_DAYS=90

# Summary/update logs (what was updated) - days to keep
# At 1 file/day, 365 days = ~365 log files
SUMMARY_LOG_RETENTION_DAYS=365


# ============================================================================
# NOTIFICATIONS
# ============================================================================
# macOS Notification Center alerts are displayed via osascript.
# Notifications appear as standard macOS banners/alerts and respect
# your system Do Not Disturb / Focus Mode settings.
#
# Recommended workflow:
#   1. Leave NOTIFY_ON_EVERY_RUN=true initially to verify the daemon works
#   2. After a few days of confirmed operation, set it to false
#   3. Keep NOTIFY_ON_ERROR=true permanently so you're alerted to problems
# ----------------------------------------------------------------------------

# Show macOS notification on every run (true/false)
# Useful for testing/verification; set to false once you're satisfied
# the daemon is running correctly on schedule
NOTIFY_ON_EVERY_RUN=true

# Always show macOS notification on errors (true/false)
# Strongly recommended to keep this enabled permanently
NOTIFY_ON_ERROR=true


# ============================================================================
# UPDATE BEHAVIOR
# ============================================================================
# Controls which Homebrew maintenance commands are executed during each
# update cycle. Disable individual steps if needed (e.g., if you prefer
# to manually control upgrades but still want automatic index updates).
# ----------------------------------------------------------------------------

# Run 'brew upgrade' to install newer versions of outdated packages (true/false)
# If false, the script still runs 'brew update' (index refresh) and logs
# what's outdated, but doesn't actually install anything.
AUTO_UPGRADE=true

# Run 'brew cleanup' to remove old package versions and stale downloads (true/false)
# Recommended: prevents unbounded growth of the Homebrew cache directory.
AUTO_CLEANUP=true

# Cleanup downloads older than N days (integer)
# 0 = use brew's default (120 days)
# Set to a lower value if disk space is a concern
CLEANUP_OLDER_THAN_DAYS=0

# Run 'brew autoremove' to remove orphaned dependencies (true/false)
# Removes formulae that were installed as dependencies of something
# that has since been uninstalled. Safe to enable.
AUTO_REMOVE=true

# Upgrade casks (GUI applications like Chrome, VSCode, etc.) (true/false)
# Casks are macOS .app bundles installed via Homebrew.
UPGRADE_CASKS=true

# Include greedy cask upgrades (true/false)
# "Greedy" casks are apps that have their own built-in auto-update
# mechanism (e.g., Chrome, Firefox, Slack). By default, brew skips
# these since the app updates itself. Set to true to let brew manage
# ALL cask updates, even self-updating ones.
# Warning: May cause brief app restarts or conflicts with in-app updates.
UPGRADE_CASKS_GREEDY=false


# ============================================================================
# ADVANCED OPTIONS
# ============================================================================
# Most users won't need to change these. They exist for edge cases like
# non-standard Homebrew installations or custom environment requirements.
# ----------------------------------------------------------------------------

# Path to brew binary (string, leave empty for auto-detection)
# Auto-detection checks: /opt/homebrew/bin/brew (Apple Silicon),
# then /usr/local/bin/brew (Intel), then PATH lookup.
# Only set this if you have a non-standard Homebrew installation.
BREW_PATH=""

# Extra environment variables for brew commands (space-separated KEY=VALUE pairs)
# These are exported before any brew command runs.
# Example: BREW_ENV="HOMEBREW_NO_ANALYTICS=1 HOMEBREW_NO_EMOJI=1"
BREW_ENV=""
