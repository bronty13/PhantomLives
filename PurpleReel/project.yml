name: PurpleReel
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "16"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.29.0"

targets:
  PurpleReel:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleReel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleReel
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/PurpleReel/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleReel/App/PurpleReel.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: GRDB
    scheme:
      testTargets:
        - PurpleReelTests

  PurpleReelTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleReelTests
    dependencies:
      - target: PurpleReel
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleReelTests
