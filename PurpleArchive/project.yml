name: PurpleArchive
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"

# Vendored C libraries (committed sources) + later Sparkle. The QuickLook /
# Thumbnail / Finder Sync app-extensions arrive in Phase 2-3; at that point
# ArchiveKit is split into its own `framework` target embedded once and linked
# by each appex (the PurpleMark pattern). For the MVP the engine compiles
# straight into the app.
packages:
  CLibArchive:
    path: Vendor/CLibArchive
  CZstd:
    path: Vendor/CZstd
  CPeeler:
    path: Vendor/CPeeler
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    # Source Info.plist carries 0.0.0 / 0 placeholders; build-app.sh stamps the
    # real git-derived version into the BUILT bundle so tracked files stay
    # pristine across builds (Timeliner/PurpleMark pattern).

targets:
  PurpleArchive:
    type: application
    platform: macOS
    sources:
      - path: Sources/ArchiveKit
      - path: Sources/PurpleArchive
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchive
        PRODUCT_NAME: PurpleArchive
        INFOPLIST_FILE: Sources/PurpleArchive/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleArchive/App/PurpleArchive.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: CLibArchive
      - package: CZstd
      - package: CPeeler
      - package: Sparkle
    scheme:
      testTargets:
        - PurpleArchiveTests

  PurpleArchiveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleArchiveTests
    dependencies:
      - target: PurpleArchive
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchiveTests
