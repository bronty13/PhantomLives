name: PurpleArchive
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"

# ArchiveKit is a shared framework so the app AND the Quick Look / Thumbnail /
# Finder Sync app-extensions all link one copy (the PurpleMark pattern). The
# vendored C libraries + Sparkle are SwiftPM packages.
packages:
  CLibArchive:
    path: Vendor/CLibArchive
  CZstd:
    path: Vendor/CZstd
  CPeeler:
    path: Vendor/CPeeler
  CUnrar:
    path: Vendor/CUnrar
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    # Source Info.plist carries 0.0.0 / 0 placeholders; build-app.sh stamps the
    # real git-derived version into the BUILT bundle so tracked files stay
    # pristine across builds (Timeliner/PurpleMark pattern).

targets:
  # ---- Shared engine framework (libarchive/zstd/peeler behind ArchiveKit) ----
  ArchiveKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ArchiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.ArchiveKit
        PRODUCT_NAME: ArchiveKit
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    dependencies:
      - package: CLibArchive
      - package: CZstd
      - package: CPeeler
      - package: CUnrar

  # ---- The app ----
  PurpleArchive:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleArchive
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchive
        PRODUCT_NAME: PurpleArchive
        INFOPLIST_FILE: Sources/PurpleArchive/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleArchive/App/PurpleArchive.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - target: ArchiveKit
        embed: true
        link: true
      - target: PurpleArchiveQuickLook
        embed: true
      - target: PurpleArchiveThumbnail
        embed: true
      - target: PurpleArchiveFinderSync
        embed: true
      - package: Sparkle
    scheme:
      testTargets:
        - PurpleArchiveTests

  # ---- Quick Look content preview (spacebar) ----
  PurpleArchiveQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/PurpleArchiveQuickLook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchive.QuickLook
        INFOPLIST_FILE: Sources/PurpleArchiveQuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleArchiveQuickLook/QuickLook.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../../../Frameworks"
    dependencies:
      - target: ArchiveKit
        embed: false
        link: true

  # ---- Quick Look thumbnail (content-aware Finder icon) ----
  PurpleArchiveThumbnail:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/PurpleArchiveThumbnail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchive.Thumbnail
        INFOPLIST_FILE: Sources/PurpleArchiveThumbnail/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleArchiveThumbnail/Thumbnail.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../../../Frameworks"
    dependencies:
      - target: ArchiveKit
        embed: false
        link: true

  # ---- Finder Sync (right-click extract/compress) ----
  PurpleArchiveFinderSync:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/PurpleArchiveFinderSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchive.FinderSync
        INFOPLIST_FILE: Sources/PurpleArchiveFinderSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleArchiveFinderSync/FinderSync.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../../../Frameworks"
    dependencies:
      - target: ArchiveKit
        embed: false
        link: true

  # ---- Unit tests ----
  PurpleArchiveTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleArchiveTests
    dependencies:
      - target: PurpleArchive
      - target: ArchiveKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleArchiveTests
