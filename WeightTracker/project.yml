name: WeightTracker
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  WeightTracker:
    type: application
    platform: macOS
    sources:
      - path: Sources/WeightTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.WeightTracker
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/WeightTracker/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WeightTracker/App/WeightTracker.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GRDB
    scheme:
      testTargets: []
