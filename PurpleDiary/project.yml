name: PurpleDiary
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  # Vendored SQLCipher 4.6.1 amalgamation (CommonCrypto-based — no OpenSSL,
  # no Homebrew). Provides the encrypted-at-rest SQLite. See
  # Vendor/SQLCipher/PROVENANCE.md for the tarball SHA-256 + build flags.
  SQLCipher:
    path: Vendor/SQLCipher
  # Vendored GRDB.swift, patched so its CSQLite target re-exports the vendored
  # SQLCipher's sqlite3.h. That makes GRDB's `sqlite3_*` calls resolve into
  # SQLCipher's statically-linked symbols instead of the system
  # libsqlite3.dylib — i.e. the whole DB becomes SQLCipher-encrypted once a
  # PRAGMA key is set. See Vendor/GRDB/Package.swift for the patch context.
  GRDB:
    path: Vendor/GRDB

targets:
  PurpleDiary:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleDiary
      # Bundle the security whitepaper into Contents/Resources so the in-app
      # SecurityDocView can render it via Bundle.main lookup. Docs/ stays the
      # canonical authoring location.
      - path: Docs/SECURITY.md
        type: file
        buildPhase:
          copyFiles:
            destination: resources
      # Bundled writing-prompt library (Phase 4 Reflection). Static content,
      # rotated daily on-device — no network. Kept outside the Sources glob
      # (like Docs/SECURITY.md) so it's bundled once as a resource.
      - path: Resources/Prompts.json
        type: file
        buildPhase:
          copyFiles:
            destination: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleDiary
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/PurpleDiary/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleDiary/App/PurpleDiary.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      # SQLCipher BEFORE GRDB so the linker resolves SQLCipher's `sqlite3_*`
      # symbols (static archive) before GRDB's CSQLite, which would otherwise
      # pull in the system libsqlite3.dylib and shadow our static symbols.
      - package: SQLCipher
      - package: GRDB
    scheme:
      testTargets:
        - PurpleDiaryTests

  PurpleDiaryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleDiaryTests
    dependencies:
      - target: PurpleDiary
      - package: SQLCipher
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleDiaryTests
