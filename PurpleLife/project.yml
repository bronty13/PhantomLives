name: PurpleLife
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  # Vendored GRDB.swift. The only difference from upstream is
  # `Vendor/GRDB/Sources/CSQLite/module.modulemap` — the `link "sqlite3"`
  # directive was removed so the linker doesn't pull in the system
  # libsqlite3.dylib. That cleared the way for our vendored SQLCipher's
  # statically-linked `sqlite3_*` symbols to win at link time. See
  # Vendor/GRDB/Sources/CSQLite/module.modulemap for the patch context.
  GRDB:
    path: Vendor/GRDB
  # Vendored SQLCipher 4.6.1 amalgamation. Compiles a SQLCipher build of
  # SQLite alongside the app; the patched GRDB CSQLite module map above
  # lets GRDB's `sqlite3_*` calls resolve here. See Vendor/SQLCipher/
  # PROVENANCE.md for the SHA-256 + build recipe.
  SQLCipher:
    path: Vendor/SQLCipher

targets:
  PurpleLife:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleLife
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SRKV8T38CD
        INFOPLIST_FILE: Sources/PurpleLife/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleLife/App/PurpleLife.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      # SQLCipher BEFORE GRDB so the linker sees our SQLCipher's `sqlite3_*`
      # symbols (in the static archive from `Vendor/SQLCipher/`) before
      # processing GRDB's CSQLite module map, which has an implicit
      # `link "sqlite3"` that would otherwise pull in the system
      # libsqlite3.dylib and shadow our static symbols.
      - package: SQLCipher
      - package: GRDB
    scheme:
      testTargets:
        - PurpleLifeTests

  PurpleLifeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleLifeTests
    dependencies:
      - target: PurpleLife
      - package: SQLCipher
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleLifeTests
        # Same team as the host so the .xctest bundle is properly signed —
        # the Phase-4 host has Hardened Runtime via Apple Development
        # signing, which refuses to load ad-hoc-signed test bundles.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SRKV8T38CD
