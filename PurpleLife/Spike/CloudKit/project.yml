name: CloudKitSpike
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

targets:
  CloudKitSpike:
    type: application
    platform: macOS
    sources:
      - path: Sources/CloudKitSpike
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleLife.CloudKitSpike
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Sources/CloudKitSpike/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/CloudKitSpike/CloudKitSpike.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
