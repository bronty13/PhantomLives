name: PurpleMark
options:
  bundleIdPrefix: com.bronty13
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    # Source plists carry 0.0.0 / 0 placeholders; build-app.sh stamps the
    # real git-derived version into the BUILT bundle so tracked files stay
    # pristine across builds (Timeliner pattern).

targets:
  # ---- Shared markdown -> HTML rendering core (WebKit + bundled JS/CSS) ----
  PurpleMarkRenderCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PurpleMarkRenderCore
        excludes:
          - "Web/**"
      # Web assets (HTML/CSS/JS/fonts) copied verbatim as a folder reference so
      # the vendor/katex/fonts hierarchy and relative URLs survive into the bundle.
      - path: Sources/PurpleMarkRenderCore/Web
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleMarkRenderCore
        PRODUCT_NAME: PurpleMarkRenderCore
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  # ---- The editor app ----
  PurpleMark:
    type: application
    platform: macOS
    sources:
      - path: Sources/PurpleMark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleMark
        INFOPLIST_FILE: Sources/PurpleMark/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleMark/App/PurpleMark.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - target: PurpleMarkRenderCore
        embed: true
        link: true
      - target: PurpleMarkQuickLook
        embed: true
    scheme:
      testTargets:
        - PurpleMarkTests

  # ---- Finder Quick Look preview extension ----
  PurpleMarkQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/PurpleMarkQuickLook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleMark.QuickLook
        INFOPLIST_FILE: Sources/PurpleMarkQuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PurpleMarkQuickLook/PurpleMarkQuickLook.entitlements
        # Extension finds RenderCore in the host app's Frameworks dir.
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../../../Frameworks"
    dependencies:
      - target: PurpleMarkRenderCore
        embed: false
        link: true

  # ---- Unit tests ----
  PurpleMarkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PurpleMarkTests
    dependencies:
      - target: PurpleMark
      - target: PurpleMarkRenderCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bronty13.PurpleMarkTests
