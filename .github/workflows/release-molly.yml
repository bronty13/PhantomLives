name: Release Molly

# Subproject-scoped tag (Molly is one of many subprojects in PhantomLives —
# this trigger is intentionally narrow so future subprojects can release
# under their own prefix without colliding).
on:
  push:
    tags:
      - "molly-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: Molly

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node 22.13+ (it uses node:sqlite, a built-in
          # introduced in Node 22).
          node-version: 22
          cache: pnpm
          cache-dependency-path: Molly/pnpm-lock.yaml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Molly/src-tauri -> target"

      - name: Install pnpm dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build + publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the auto-update flow to verify
          # bundles. Generated locally via `pnpm tauri signer generate`;
          # public key sits in Molly/src-tauri/tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID + notarization (optional — without these the .dmg is
          # unsigned and Gatekeeper will warn on first launch). Set these in repo
          # secrets when an Apple Developer cert is available:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
          # Windows code-signing (optional — without these the .exe will trigger
          # SmartScreen warnings):
          #   WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD.
        with:
          projectPath: Molly
          tagName: ${{ github.ref_name }}
          releaseName: "Molly ${{ github.ref_name }}"
          releaseBody: |
            Auto-built from tag ${{ github.ref_name }}.

            **Updater**: signed feed available as `latest.json`. macOS and Windows
            users on prior versions will get this update automatically through
            Settings → Updates.

            Note: until an Apple Developer ID cert and Windows code-signing cert
            are wired up, the `.dmg` is unsigned (Gatekeeper warns on first
            launch — right-click → Open) and the `.exe` may trigger SmartScreen
            (More info → Run anyway). Updater verification itself works because
            the updater bundles are signed with our minisign key.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action @v0 doesn't upload .sig files in matrix mode (each
      # runner only has its own platform's sigs, so its latest.json build
      # aborts with "Signature not found" and the sigs go up with it).
      # We upload them explicitly so the publish-feed job can compose a
      # cross-platform latest.json afterwards.
      - name: Upload updater signatures (mac)
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          echo "::group::find .sig files anywhere under the project"
          find "$GITHUB_WORKSPACE" -name "*.sig" -type f 2>&1 || true
          echo "::endgroup::"
          # macOS runner uses bash 3.2 — no `mapfile`. Use a portable
          # while-read loop, and walk the cargo target dir top-down so
          # any nested bundle layout still gets covered.
          count=0
          while IFS= read -r -d '' f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
            count=$((count + 1))
          done < <(find src-tauri/target -name "*.sig" -type f -print0)
          if [ "$count" -eq 0 ]; then
            echo "no .sig files found under src-tauri/target"
            exit 1
          fi
          echo "Uploaded $count signature(s)."

      - name: Upload updater signatures (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          Write-Host "::group::find .sig files anywhere under the project"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "*.sig" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "::endgroup::"
          $sigs = Get-ChildItem -Path "src-tauri/target" -Filter "*.sig" -Recurse -ErrorAction SilentlyContinue
          if (-not $sigs -or $sigs.Count -eq 0) {
            Write-Host "no .sig files found under src-tauri/target"
            exit 1
          }
          foreach ($f in $sigs) {
            Write-Host "Uploading $($f.FullName)"
            gh release upload "$env:TAG" "$($f.FullName)" --clobber
          }
          Write-Host ("Uploaded {0} signature(s)." -f $sigs.Count)

  publish-feed:
    # Compose latest.json from the freshly-uploaded .sig files. This runs
    # after both build matrix jobs so it sees every platform's signature.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs

      - name: Compose latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${TAG#molly-v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Mac signature is for the .app.tar.gz updater bundle.
          MAC_SIG_FILE=$(ls sigs/*aarch64.app.tar.gz.sig 2>/dev/null || true)
          if [ -z "$MAC_SIG_FILE" ]; then
            # Fall back to non-arch-suffixed name (tauri-action sometimes uploads it
            # without the arch in the sig basename).
            MAC_SIG_FILE=$(ls sigs/*.app.tar.gz.sig 2>/dev/null || true)
          fi
          MAC_SIG=$(cat "$MAC_SIG_FILE" 2>/dev/null || echo "")

          # Windows updater bundle is the NSIS .zip.
          WIN_SIG_FILE=$(ls sigs/*x64-setup.nsis.zip.sig 2>/dev/null || true)
          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")

          echo "Mac sig file: $MAC_SIG_FILE"
          echo "Win sig file: $WIN_SIG_FILE"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Auto-built from tag ${TAG}. See the GitHub release page for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/Molly_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/Molly_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" latest.json --clobber
