name: Release Molly

# Subproject-scoped tag (Molly is one of many subprojects in PhantomLives —
# this trigger is intentionally narrow so future subprojects can release
# under their own prefix without colliding).
on:
  push:
    tags:
      - "molly-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^molly-v/, '');
            // If a release for this tag already exists (rerun, retried tag),
            // reuse it rather than fail.
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = data;
              core.info(`Reusing existing release ${release.id}`);
            } catch (e) {
              if (e.status !== 404) throw e;
              // Drafts aren't returned by getReleaseByTag — scan listReleases.
              const { data: list } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              release = list.find((r) => r.tag_name === tag);
              if (release) {
                core.info(`Reusing existing draft release ${release.id}`);
              }
            }
            if (!release) {
              const body = [
                `Auto-built from tag ${tag}.`,
                ``,
                `**Updater**: signed feed at \`latest.json\`. Users on prior versions get this through Settings → Updates.`,
                ``,
                `Note: until Apple Developer ID + Windows code-sign certs are wired, the \`.dmg\` is unsigned (Gatekeeper warns on first launch — right-click → Open) and the \`.exe\` may trigger SmartScreen (More info → Run anyway). Updater verification still works — bundles are signed with our minisign key.`,
              ].join('\n');
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Molly ${tag}`,
                body,
                draft: true,
                prerelease: false,
              });
              release = data;
              core.info(`Created draft release ${release.id} (version ${version})`);
            }
            core.setOutput('release_id', String(release.id));

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    # Hard cap so a stuck Rust compile / cargo cache hang doesn't burn
    # 6 hours of runner minutes. A successful build is ~5-12 min hot,
    # ~12-20 cold. 25 leaves comfortable headroom; anything past that
    # is hung and should be killed.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Molly

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node 22.13+ (it uses node:sqlite, a built-in
          # introduced in Node 22).
          node-version: 22
          cache: pnpm
          cache-dependency-path: Molly/pnpm-lock.yaml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Molly/src-tauri -> target"

      - name: Install pnpm dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri bundles
        shell: bash
        run: pnpm tauri build ${{ matrix.args }}

      # `tauri build` produces platform installers (.dmg, .nsis, .msi)
      # but NOT the updater bundles (.app.tar.gz / .nsis.zip). That's
      # historically tauri-action's job and the action only does it when
      # configured to release. We do it ourselves so we don't have to
      # depend on tauri-action's hidden state. `tauri signer sign` reads
      # TAURI_SIGNING_PRIVATE_KEY from env and writes <FILE>.sig next to
      # the input.
      - name: Pack + sign mac updater bundle
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          BUNDLE=src-tauri/target/release/bundle/macos
          DMG_BUNDLE=src-tauri/target/release/bundle/dmg
          if [ ! -d "$BUNDLE/Molly.app" ]; then
            echo "$BUNDLE/Molly.app not found"
            ls -la "$BUNDLE" || true
            exit 1
          fi
          # Strip stray xattrs (resource forks / Finder info) before
          # signing — even on hosted runners these can be left behind
          # by the bundler and they make codesign abort with "resource
          # fork, Finder information, or similar detritus not allowed."
          xattr -cr "$BUNDLE/Molly.app"
          # Deep ad-hoc sign so Gatekeeper recognises the bundle's
          # CodeDirectory + sealed resources. Without this, the bundle
          # is only linker-signed and macOS Sonoma+ rejects downloaded
          # copies with "Molly is damaged and can't be opened" — even
          # right-click → Open won't bypass it. Ad-hoc signing makes
          # it an "unidentified developer" prompt instead, which is
          # the documented right-click → Open path.
          # Don't add --options runtime — hardened runtime requires a
          # real Developer ID cert; for ad-hoc the option is silently
          # dropped on signing but blocks `codesign --verify` later.
          codesign --force --deep --sign - "$BUNDLE/Molly.app"
          codesign --verify --deep --strict --verbose=2 "$BUNDLE/Molly.app"
          # Re-bundle the now-signed .app into a fresh DMG so the
          # downloadable artifact carries the same signature. The DMG
          # produced by `tauri build` was made before we re-signed.
          if [ -d "$DMG_BUNDLE" ]; then
            DMG=$(ls "$DMG_BUNDLE"/*.dmg 2>/dev/null | head -n1)
            if [ -n "$DMG" ]; then
              rm -f "$DMG"
              VERSION=$(node -p "require('./package.json').version")
              NEW_DMG="$DMG_BUNDLE/Molly_${VERSION}_aarch64.dmg"
              hdiutil create -volname "Molly" -srcfolder "$BUNDLE/Molly.app" -ov -format UDZO "$NEW_DMG"
            fi
          fi
          (cd "$BUNDLE" && tar czf "Molly_aarch64.app.tar.gz" "Molly.app")
          pnpm tauri signer sign "$BUNDLE/Molly_aarch64.app.tar.gz"
          ls -la "$BUNDLE"
          ls -la "$DMG_BUNDLE" 2>/dev/null || true

      - name: Pack + sign windows updater bundle
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/release/bundle/nsis"
          $exe = Join-Path $bundle "Molly_${version}_x64-setup.exe"
          $zip = Join-Path $bundle "Molly_${version}_x64-setup.nsis.zip"
          if (-not (Test-Path $exe)) {
            Write-Host "$exe not found"
            Get-ChildItem -Path $bundle -ErrorAction SilentlyContinue
            exit 1
          }
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          pnpm tauri signer sign $zip
          Get-ChildItem -Path $bundle

      - name: Upload bundles + signatures (mac)
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          echo "::group::find produced artifacts"
          find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) 2>&1 || true
          echo "::endgroup::"
          count=0
          while IFS= read -r -d '' f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
            count=$((count + 1))
          done < <(find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "no artifacts found"
            exit 1
          fi
          echo "Uploaded $count artifact(s)."

      - name: Upload bundles + signatures (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          Write-Host "::group::find produced artifacts"
          $found = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '\.(exe|msi|sig|nsis\.zip)$' }
          $found | Select-Object FullName
          Write-Host "::endgroup::"
          if (-not $found -or $found.Count -eq 0) {
            Write-Host "no artifacts found"
            exit 1
          }
          foreach ($f in $found) {
            Write-Host "Uploading $($f.FullName)"
            gh release upload "$env:TAG" "$($f.FullName)" --clobber
          }
          Write-Host ("Uploaded {0} artifact(s)." -f $found.Count)

  publish-feed:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs
          ls -la sigs

      - name: Compose latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${TAG#molly-v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Mac updater bundle signature — try arch-suffixed name first,
          # then fall back to the plain name tauri produces locally.
          MAC_SIG_FILE=""
          for candidate in sigs/Molly_${VERSION}_aarch64.app.tar.gz.sig sigs/Molly_aarch64.app.tar.gz.sig sigs/Molly.app.tar.gz.sig; do
            if [ -f "$candidate" ]; then MAC_SIG_FILE="$candidate"; break; fi
          done
          MAC_SIG=$(cat "$MAC_SIG_FILE" 2>/dev/null || echo "")

          # Windows updater bundle signature is the NSIS .zip.sig.
          WIN_SIG_FILE=""
          for candidate in sigs/Molly_${VERSION}_x64-setup.nsis.zip.sig sigs/Molly_x64-setup.nsis.zip.sig; do
            if [ -f "$candidate" ]; then WIN_SIG_FILE="$candidate"; break; fi
          done
          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")

          echo "Mac sig file: $MAC_SIG_FILE"
          echo "Win sig file: $WIN_SIG_FILE"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Auto-built from tag ${TAG}. See the GitHub release page for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/Molly_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/Molly_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF
          echo "::group::latest.json"
          cat latest.json
          echo "::endgroup::"

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" latest.json --clobber

      # Keep a stable, Molly-scoped feed release current. Molly's updater
      # endpoint points at `releases/download/molly-updater-feed/latest.json`
      # rather than the repo-wide `releases/latest/...`: in this monorepo a
      # SideMolly release becomes GitHub's "latest", and that release has no
      # `latest.json` asset, so Molly's updater would 404 and silently stop
      # finding updates. A dedicated prerelease holding the newest manifest
      # decouples Molly's feed from whatever shipped most recently. The
      # install URLs inside latest.json are absolute (they point at the
      # versioned tag), so they resolve regardless of where the manifest lives.
      - name: Refresh Molly-scoped updater feed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view molly-updater-feed >/dev/null 2>&1; then
            gh release create molly-updater-feed \
              --title "Molly updater feed" \
              --notes "Auto-maintained pointer to the newest Molly release manifest for the in-app updater. Do not delete." \
              --prerelease
          fi
          gh release upload molly-updater-feed latest.json --clobber

      # Flip the draft to published. Required for the Tauri updater —
      # `releases/latest/download/latest.json` only resolves against
      # published releases, and `releases/download/<tag>/...` 404s for
      # drafts even with a tag. Previously this was a manual step in
      # the GitHub UI and v1.8.1 sat as a draft overnight, breaking
      # Sallie's auto-updater.
      - name: Publish release (flip draft → published)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --draft=false
          echo "Published $TAG"
