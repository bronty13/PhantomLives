name: Release Molly

# Subproject-scoped tag (Molly is one of many subprojects in PhantomLives —
# this trigger is intentionally narrow so future subprojects can release
# under their own prefix without colliding).
on:
  push:
    tags:
      - "molly-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create empty draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          VERSION="${TAG#molly-v}"
          # Idempotent: if a draft for this tag already exists, reuse it.
          ID=$(gh api repos/${GITHUB_REPOSITORY}/releases --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -1)
          if [ -z "$ID" ]; then
            ID=$(gh release create "${TAG}" \
              --draft \
              --title "Molly ${TAG}" \
              --notes "Auto-built from tag ${TAG}.

          **Updater**: signed feed at \`latest.json\`. Users on prior versions get this through Settings → Updates.

          Note: until Apple Developer ID + Windows code-sign certs are wired, the \`.dmg\` is unsigned (Gatekeeper warns on first launch — right-click → Open) and the \`.exe\` may trigger SmartScreen (More info → Run anyway). Updater verification still works — bundles are signed with our minisign key." \
              --target main 2>&1 | tee /tmp/create.out | grep -oE '[0-9]+$' | tail -1)
            # Fallback: read id from the API in case parsing the URL failed.
            if [ -z "$ID" ]; then
              ID=$(gh api repos/${GITHUB_REPOSITORY}/releases --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -1)
            fi
          fi
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"
          echo "Using release id: $ID (version $VERSION)"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: Molly

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node 22.13+ (it uses node:sqlite, a built-in
          # introduced in Node 22).
          node-version: 22
          cache: pnpm
          cache-dependency-path: Molly/pnpm-lock.yaml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Molly/src-tauri -> target"

      - name: Install pnpm dependencies
        run: pnpm install --no-frozen-lockfile

      # Run `tauri build` directly. tauri-action @v0 with no tagName
      # builds without signing (signing is gated on its release flow),
      # which is the exact opposite of what we need. The CLI honors
      # TAURI_SIGNING_PRIVATE_KEY itself and leaves .sig files in the
      # bundle dir — that's what we want.
      - name: Build Tauri bundles (with signing)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload bundles + signatures (mac)
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          echo "::group::find produced artifacts"
          find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) 2>&1 || true
          echo "::endgroup::"
          count=0
          while IFS= read -r -d '' f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
            count=$((count + 1))
          done < <(find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "no artifacts found"
            exit 1
          fi
          echo "Uploaded $count artifact(s)."

      - name: Upload bundles + signatures (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          Write-Host "::group::find produced artifacts"
          $found = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '\.(exe|msi|sig|nsis\.zip)$' }
          $found | Select-Object FullName
          Write-Host "::endgroup::"
          if (-not $found -or $found.Count -eq 0) {
            Write-Host "no artifacts found"
            exit 1
          }
          foreach ($f in $found) {
            Write-Host "Uploading $($f.FullName)"
            gh release upload "$env:TAG" "$($f.FullName)" --clobber
          }
          Write-Host ("Uploaded {0} artifact(s)." -f $found.Count)

  publish-feed:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs
          ls -la sigs

      - name: Compose latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${TAG#molly-v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Mac updater bundle signature — try arch-suffixed name first,
          # then fall back to the plain name tauri produces locally.
          MAC_SIG_FILE=""
          for candidate in sigs/Molly_${VERSION}_aarch64.app.tar.gz.sig sigs/Molly_aarch64.app.tar.gz.sig sigs/Molly.app.tar.gz.sig; do
            if [ -f "$candidate" ]; then MAC_SIG_FILE="$candidate"; break; fi
          done
          MAC_SIG=$(cat "$MAC_SIG_FILE" 2>/dev/null || echo "")

          # Windows updater bundle signature is the NSIS .zip.sig.
          WIN_SIG_FILE=""
          for candidate in sigs/Molly_${VERSION}_x64-setup.nsis.zip.sig sigs/Molly_x64-setup.nsis.zip.sig; do
            if [ -f "$candidate" ]; then WIN_SIG_FILE="$candidate"; break; fi
          done
          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")

          echo "Mac sig file: $MAC_SIG_FILE"
          echo "Win sig file: $WIN_SIG_FILE"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Auto-built from tag ${TAG}. See the GitHub release page for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/Molly_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/Molly_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF
          echo "::group::latest.json"
          cat latest.json
          echo "::endgroup::"

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" latest.json --clobber
