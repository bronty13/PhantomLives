name: Release Purple Tree

# Subproject-scoped tag so PurpleTree releases under its own prefix without
# colliding with other PhantomLives subprojects (molly-v*, purplepdf-v*, …).
on:
  push:
    tags:
      - "purpletree-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse draft release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '') || context.payload.ref?.replace('refs/tags/', '');
            // Reuse an existing release for this tag (rerun / retried tag).
            let release = null;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag,
              });
              release = data;
            } catch (e) {
              if (e.status !== 404) throw e;
              const { data: list } = await github.rest.repos.listReleases({
                owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
              });
              release = list.find((r) => r.tag_name === tag) || null;
            }
            if (!release) {
              const body = [
                `Purple Tree ${tag} — cross-platform disk-space analyzer & cleanup utility.`,
                ``,
                `**Windows:** download the \`Purple Tree Setup *.exe\` installer below.`,
                `It is not code-signed yet, so Windows SmartScreen may warn on first run —`,
                `click **More info → Run anyway**. macOS builds are produced locally for now.`,
              ].join('\n');
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: tag, name: `Purple Tree ${tag}`, body,
                draft: true, prerelease: false,
              });
              release = data;
            }
            core.info(`Release ready: ${release.id}`);

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: PurpleTree
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PurpleTree/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build

      - name: Package Windows installer (NSIS)
        # --publish never: we attach artifacts to our own tag release below,
        # rather than letting electron-builder create a version-named release
        # (which would collide with the other apps in this monorepo).
        run: npx electron-builder --win --publish never

      - name: Upload installer to the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $found = Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '\.(exe|exe\.blockmap)$' -or $_.Name -eq 'latest.yml' }
          $found | Select-Object FullName
          if (-not $found -or $found.Count -eq 0) {
            Write-Host "::error::no Windows artifacts found under dist/"
            Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          foreach ($f in $found) {
            Write-Host "Uploading $($f.FullName)"
            gh release upload "$env:TAG" "$($f.FullName)" --clobber
          }
          Write-Host ("Uploaded {0} artifact(s)." -f $found.Count)

  publish:
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish release (flip draft → published)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --draft=false
          echo "Published $TAG"
