name: Release SideMolly

# Subproject-scoped tag (SideMolly is one of many PhantomLives subprojects).
# Intentionally narrow so it doesn't fire on Molly tags etc.
on:
  push:
    tags:
      - "sidemolly-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^sidemolly-v/, '');
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = data;
              core.info(`Reusing existing release ${release.id}`);
            } catch (e) {
              if (e.status !== 404) throw e;
              const { data: list } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              release = list.find((r) => r.tag_name === tag);
              if (release) {
                core.info(`Reusing existing draft release ${release.id}`);
              }
            }
            if (!release) {
              const body = [
                `Auto-built from tag ${tag}.`,
                ``,
                `**Updater**: signed feed at \`sidemolly-latest.json\`. Users on prior versions get this through Settings → Updates.`,
                ``,
                `Note: until Apple Developer ID + Windows code-sign certs are wired, the \`.dmg\` is unsigned (Gatekeeper warns on first launch — right-click → Open) and the \`.exe\` may trigger SmartScreen (More info → Run anyway). Updater verification still works — bundles are signed with our minisign key.`,
              ].join('\n');
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `SideMolly ${tag}`,
                body,
                draft: true,
                prerelease: false,
              });
              release = data;
              core.info(`Created draft release ${release.id} (version ${version})`);
            }
            core.setOutput('release_id', String(release.id));

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 25
    defaults:
      run:
        working-directory: SideMolly

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: SideMolly/pnpm-lock.yaml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "SideMolly/src-tauri -> target"

      - name: Install pnpm dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri bundles
        shell: bash
        run: pnpm tauri build ${{ matrix.args }}

      - name: Pack + sign mac updater bundle
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.SIDEMOLLY_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.SIDEMOLLY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          BUNDLE=src-tauri/target/release/bundle/macos
          DMG_BUNDLE=src-tauri/target/release/bundle/dmg
          if [ ! -d "$BUNDLE/SideMolly.app" ]; then
            echo "$BUNDLE/SideMolly.app not found"
            ls -la "$BUNDLE" || true
            exit 1
          fi
          xattr -cr "$BUNDLE/SideMolly.app"
          codesign --force --deep --sign - "$BUNDLE/SideMolly.app"
          codesign --verify --deep --strict --verbose=2 "$BUNDLE/SideMolly.app"
          if [ -d "$DMG_BUNDLE" ]; then
            DMG=$(ls "$DMG_BUNDLE"/*.dmg 2>/dev/null | head -n1)
            if [ -n "$DMG" ]; then
              rm -f "$DMG"
              VERSION=$(node -p "require('./package.json').version")
              NEW_DMG="$DMG_BUNDLE/SideMolly_${VERSION}_aarch64.dmg"
              hdiutil create -volname "SideMolly" -srcfolder "$BUNDLE/SideMolly.app" -ov -format UDZO "$NEW_DMG"
            fi
          fi
          (cd "$BUNDLE" && tar czf "SideMolly_aarch64.app.tar.gz" "SideMolly.app")
          pnpm tauri signer sign "$BUNDLE/SideMolly_aarch64.app.tar.gz"
          ls -la "$BUNDLE"
          ls -la "$DMG_BUNDLE" 2>/dev/null || true

      - name: Pack + sign windows updater bundle
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.SIDEMOLLY_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.SIDEMOLLY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $bundle = "src-tauri/target/release/bundle/nsis"
          $exe = Join-Path $bundle "SideMolly_${version}_x64-setup.exe"
          $zip = Join-Path $bundle "SideMolly_${version}_x64-setup.nsis.zip"
          if (-not (Test-Path $exe)) {
            Write-Host "$exe not found"
            Get-ChildItem -Path $bundle -ErrorAction SilentlyContinue
            exit 1
          }
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          pnpm tauri signer sign $zip
          Get-ChildItem -Path $bundle

      - name: Upload bundles + signatures (mac)
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          echo "::group::find produced artifacts"
          find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) 2>&1 || true
          echo "::endgroup::"
          count=0
          while IFS= read -r -d '' f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
            count=$((count + 1))
          done < <(find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "no artifacts found"
            exit 1
          fi
          echo "Uploaded $count artifact(s)."

      - name: Upload bundles + signatures (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          Write-Host "::group::find produced artifacts"
          $found = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '\.(exe|msi|sig|nsis\.zip)$' }
          $found | Select-Object FullName
          Write-Host "::endgroup::"
          if (-not $found -or $found.Count -eq 0) {
            Write-Host "no artifacts found"
            exit 1
          }
          foreach ($f in $found) {
            Write-Host "Uploading $($f.FullName)"
            gh release upload "$env:TAG" "$($f.FullName)" --clobber
          }
          Write-Host ("Uploaded {0} artifact(s)." -f $found.Count)

  publish-feed:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .sig files from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs
          ls -la sigs

      - name: Compose sidemolly-latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${TAG#sidemolly-v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          MAC_SIG_FILE=""
          for candidate in sigs/SideMolly_${VERSION}_aarch64.app.tar.gz.sig sigs/SideMolly_aarch64.app.tar.gz.sig sigs/SideMolly.app.tar.gz.sig; do
            if [ -f "$candidate" ]; then MAC_SIG_FILE="$candidate"; break; fi
          done
          MAC_SIG=$(cat "$MAC_SIG_FILE" 2>/dev/null || echo "")

          WIN_SIG_FILE=""
          for candidate in sigs/SideMolly_${VERSION}_x64-setup.nsis.zip.sig sigs/SideMolly_x64-setup.nsis.zip.sig; do
            if [ -f "$candidate" ]; then WIN_SIG_FILE="$candidate"; break; fi
          done
          WIN_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")

          echo "Mac sig file: $MAC_SIG_FILE"
          echo "Win sig file: $WIN_SIG_FILE"

          cat > sidemolly-latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Auto-built from tag ${TAG}. See the GitHub release page for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/SideMolly_aarch64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/SideMolly_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF
          echo "::group::sidemolly-latest.json"
          cat sidemolly-latest.json
          echo "::endgroup::"

      - name: Upload sidemolly-latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" sidemolly-latest.json --clobber

      # Flip the draft to published so the `releases/latest/download/`
      # endpoint resolves and the updater can find sidemolly-latest.json.
      - name: Publish release (flip draft → published)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --draft=false
          echo "Published $TAG"
