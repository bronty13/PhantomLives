<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PurpleMind</title>
    <script>
      // No-flash theme bootstrap. Mirrors src/state/uiTheme.ts (key
      // 'pm-theme', default 'auto'). Runs before React mounts so we never
      // flash the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('pm-theme') || 'auto';
          var dark = t === 'dark'
            || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
